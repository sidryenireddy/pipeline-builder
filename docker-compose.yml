services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pipeline_builder
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://pipeline:pipeline_dev@postgres:5432/pipeline_builder?sslmode=disable
      ENGINE_URL: http://engine:8001
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy

  engine:
    build:
      context: ./engine
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      SPARK_MASTER: local[*]
      DATABASE_URL: postgres://pipeline:pipeline_dev@postgres:5432/pipeline_builder?sslmode=disable

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

  spark:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077
    depends_on:
      - spark

volumes:
  pgdata:
